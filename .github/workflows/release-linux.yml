name: Release Linux

on:
  release:
    types:
      - created
  push:
    tags:
      - '*'

permissions:
  contents: write

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    name: Build and package (linux)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Get Package Info
        id: pkginfo
        shell: bash
        run: |
          ver=$(grep 'AppVersion' backend/consts/consts.go | awk -F'v' '{print $2}' | tr -d "',\"")  # 1.0.0
          echo "pkg_version=${ver}" >> $GITHUB_OUTPUT

      - name: Build App
        uses: zhangt58/wails-build-action@v4
        with:
          build-name: 'idf'
          build-platform: "linux/${{ matrix.arch }}"
          package: false
          go-version: '1.25'
          wails-version: 'v2.11.0'
          node-version: '24'

      - name: Prepare artifact
        shell: bash
        run: |
          set -e
          mkdir -p ./dist
          # Ensure built binary exists
          if [ ! -f ./build/bin/idf ]; then
            echo "Expected built binary at ./build/bin/idf but not found" >&2
            ls -R ./build || true
            exit 1
          fi
          chmod +x ./build/bin/idf || true
          # Rename to include arch so artifacts don't overwrite one another
          mv ./build/bin/idf ./build/bin/idf-${{ matrix.arch }}
          cp ./build/bin/idf-${{ matrix.arch }} ./dist/
          cd ./dist
          tar -czf IndicoDataFusion_${{ steps.pkginfo.outputs.pkg_version }}_linux_${{ matrix.arch }}.tar.gz idf-${{ matrix.arch }}
          ls -lh

      - name: Build AppImage
        shell: bash
        run: |
          set -e
          # Install dependencies for AppImage creation
          sudo apt-get update -qq
          sudo apt-get install -y libfuse2 file
          
          # Download linuxdeploy and appimagetool
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O linuxdeploy
          chmod +x linuxdeploy
          
          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
          
          # Copy binary
          cp ./build/bin/idf-${{ matrix.arch }} AppDir/usr/bin/idf
          chmod +x AppDir/usr/bin/idf
          
          # Copy desktop file
          cp ./build/linux/idf.desktop AppDir/usr/share/applications/
          
          # Copy and prepare icon
          cp ./build/appicon.png AppDir/usr/share/icons/hicolor/512x512/apps/idf.png
          cp ./build/appicon.png AppDir/idf.png
          
          # Run linuxdeploy to create AppImage
          ./linuxdeploy --appdir AppDir --output appimage --desktop-file=./build/linux/idf.desktop --icon-file=./build/appicon.png
          
          # Rename AppImage to follow naming convention
          mv idf-*.AppImage ./dist/IndicoDataFusion_${{ steps.pkginfo.outputs.pkg_version }}_linux_${{ matrix.arch }}.AppImage || true
          ls -lh ./dist

      - name: Upload Linux tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball-${{ matrix.arch }}
          path: ./dist/IndicoDataFusion_${{ steps.pkginfo.outputs.pkg_version }}_linux_${{ matrix.arch }}.tar.gz
          retention-days: 1

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage-${{ matrix.arch }}
          path: ./dist/IndicoDataFusion_${{ steps.pkginfo.outputs.pkg_version }}_linux_${{ matrix.arch }}.AppImage
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts (tarball amd64)
        uses: actions/download-artifact@v4
        with:
          name: linux-tarball-amd64
          path: ./dist

      - name: Download Artifacts (AppImage amd64)
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage-amd64
          path: ./dist

      - name: List downloaded files
        run: |
          ls -lhtr ./dist
          echo "Artifacts downloaded above."

      - name: Create a new release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ./dist/*.tar.gz
            ./dist/*.AppImage