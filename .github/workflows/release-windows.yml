name: Release Windows

on:
  release:
    types:
      - created

permissions:
  contents: write

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    name: Build and package (windows/amd64)
    runs-on: windows-latest
    outputs:
      pkg_version: ${{ steps.pkginfo.outputs.pkg_version }}
      pkg_name: ${{ steps.pkginfo.outputs.pkg_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Get Package Info
        id: pkginfo
        shell: bash
        run: |
          # Extract the version from app.go
          ver=$(grep 'AppVersion' app.go | awk -F'v' '{print $2}' | tr -d "',\"")  # 1.0.0
          echo "pkg_version=${ver}" >> $GITHUB_OUTPUT
          echo "pkg_name=IndicoDataFusion_${ver}.exe" >> $GITHUB_OUTPUT

      - name: Build App
        uses: zhangt58/wails-build-action@v4
        id: build
        with:
          build-name: 'idf.exe'
          build-platform: 'windows/amd64'
          package: false
          go-version: '1.25'
          wails-version: 'v2.11.0'
          node-version: '24'

      - name: Update Inno Setup ISS
        shell: bash
        run: |
          cd ./build/windows
          sed -i "/define MyAppVersion/s/.*/#define MyAppVersion \"${{ steps.pkginfo.outputs.pkg_version }}\"/" setup.iss

      - name: Create Inno Setup Installer
        uses: zhangt58/InnoSetupAction@v6.4.3
        with:
          filepath: .\build\windows\setup.iss

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer.TBD
          path: .\build\windows\output\${{ steps.pkginfo.outputs.pkg_name }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer.TBD
          path: ./dist

      - name: List downloaded files
        run: |
          ls -lhtr ./dist
          echo "Artifacts downloaded above."

      - name: Create a new release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./dist/${{ needs.build.outputs.pkg_name }}