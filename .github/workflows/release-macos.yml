name: Release macOS

on:
  release:
    types:
      - created

permissions:
  contents: write

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    name: Build and package (macOS)
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Get Package Info
        id: pkginfo
        shell: bash
        run: |
          # Extract the version from app.go
          ver=$(grep 'AppVersion' app.go | awk -F'v' '{print $2}' | tr -d "',\"")  # 1.0.0
          echo "pkg_version=${ver}" >> $GITHUB_OUTPUT

      - name: Build App
        uses: zhangt58/wails-build-action@98e3b7dd700da518ca8304b3aa0e0993a3ca33a8
        with:
          build-name: 'idf'
          build-platform: "darwin/${{ matrix.arch }}"
          package: false
          go-version: '1.25'
          wails-version: 'v2.11.0'
          node-version: '24'

      - name: Prepare macOS .pkg
        shell: bash
        run: |
          mkdir -p ./dist ./pkgroot/Applications

          # Determine package version (from earlier step output if present)
          PKG_VERSION="${{ steps.pkginfo.outputs.pkg_version }}"

          # App metadata (falls back to values in app.go)
          APP_NAME="IndicoDataFusion"
          BIN_NAME="idf"

          # Prefer pre-built .app in the wails myapp-root; copy into pkgroot then replace the executable
          if [ -d "./build/darwin/myapp-root/Applications/${APP_NAME}.app" ]; then
            echo "Found prebuilt .app in build/darwin/myapp-root; copying to pkgroot and replacing executable"
            cp -R "./build/darwin/myapp-root/Applications/${APP_NAME}.app" "./pkgroot/Applications/"

            # Overwrite the executable inside the copied .app with the freshly built binary
            if [ -f "./pkgroot/Applications/${APP_NAME}.app/Contents/MacOS/${BIN_NAME}" ]; then
              echo "Replacing ${APP_NAME}.app/Contents/MacOS/${BIN_NAME} with new build/bin/${BIN_NAME}"
            else
              echo "Warning: target executable not present in .app; creating path"
              mkdir -p "./pkgroot/Applications/${APP_NAME}.app/Contents/MacOS"
            fi
            chmod +x ./build/bin/${BIN_NAME}
            cp ./build/bin/${BIN_NAME} "./pkgroot/Applications/${APP_NAME}.app/Contents/MacOS/${BIN_NAME}"

          elif [ -d "./build/${APP_NAME}.app" ]; then
            echo "Found prebuilt .app in build/; copying to pkgroot and replacing executable"
            cp -R "./build/${APP_NAME}.app" "./pkgroot/Applications/"
            chmod +x ./build/bin/${BIN_NAME}
            cp ./build/bin/${BIN_NAME} "./pkgroot/Applications/${APP_NAME}.app/Contents/MacOS/${BIN_NAME}"

          else
            echo "No prebuilt .app found in build/darwin/myapp-root or build/. Cannot proceed." >&2
            ls -lh ./build || true
            exit 1
          fi

          pkg_identifier="com.example.indicodatafusion"
          pkg_name="${APP_NAME}_${PKG_VERSION}_macos_${{ matrix.arch }}.pkg"

          # Build the pkg; install-location / so Applications maps correctly
          pkgbuild --root ./pkgroot --identifier "${pkg_identifier}" --version "${PKG_VERSION}" --install-location / "./dist/${pkg_name}"

          ls -lh ./dist

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg-${{ matrix.arch }}
          path: ./dist/*.pkg
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-pkg-arm64
          path: ./dist

      - name: List downloaded files
        run: |
          ls -lhtr ./dist
          echo "Artifacts downloaded above."

      - name: Create a new release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./dist/*.pkg
