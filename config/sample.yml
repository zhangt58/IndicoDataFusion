# Sample configuration for the data sources

data-source:
  # the data source def to be used
  use: ConfName

# cache configuration (optional)
cache:
  # Time-to-live for cache entries (e.g., "24h", "1h30m", "30m")
  # Default: 24h
  ttl: 24h
  # Maximum cache size (e.g., "100MB", "1GB", "500MB")
  # Default: 100MB
  max_size: 100MB
  # Custom cache directory path (leave empty for default: ~/.cache/IndicoDataFusion)
  # cache_dir: /path/to/custom/cache

api-tokens:
  - name: <token-name>
    base_url: <indico-base-url>
    username: <username>
    token: ""

# chart settings (optional)
chart-settings:
  # Words to exclude from word cloud (in addition to built-in stopwords)
  excluded_words:
    - example
    - test
    - placeholder
  # Affiliation deduplication map: canonical name -> list of aliases with enabled flag
  affiliation_map:
    - canonical: MIT
      aliases:
        - Massachusetts Institute of Technology
        - MIT, USA
      enabled: true
    - canonical: Standord University
      aliases:
        - Stanford
        - Stanford U
      enabled: false
# the data source defines an actual Indico conference: <conference-name>
ConfName:
  # the base URL of the Indico server, e.g. https://indico.jacow.org
  base_url: <indico-base-url>
  # the event ID of Indico event, e.g. 82
  event_id: <event-id>
  # the API token, get it from your account settings, e.g. indp_xxx
  api_token_name: <token-name>
  # the request timeout duration
  timeout: 60s
  # is indico API?
  indico: true
  # (optional) path to a pre-processed abstracts JSON file for review mode.
  # When set, abstract data is read from this file instead of the Indico API,
  # enabling review mode without the --abstracts-file CLI flag.
  # abstracts_file: /path/to/abstracts-snapshot.json
